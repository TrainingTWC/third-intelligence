<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Third Intelligence — Admin</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #fff; --border: #e0e0e0;
    --text: #1d1d1f; --text2: #6e6e73; --accent: #0071e3;
    --accent-hover: #0077ed; --danger: #ff3b30; --danger-hover: #d63028;
    --success: #34c759; --tag-bg: #f0f0f5; --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 600; white-space: nowrap; }
  .header .url-group { display: flex; align-items: center; gap: 8px; flex: 1; }
  .header input {
    flex: 1; max-width: 480px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; outline: none;
  }
  .header input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
  .header .status { font-size: 12px; padding: 4px 10px; border-radius: 99px; white-space: nowrap; }
  .header .status.ok { background: #e8fbe8; color: #1b7a1b; }
  .header .status.err { background: #fde8e8; color: #c00; }
  .header .status.pending { background: #fef9e7; color: #856404; }

  /* ── Buttons ── */
  .btn {
    padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    border: none; cursor: pointer; transition: all .15s; display: inline-flex;
    align-items: center; gap: 6px; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-ghost { background: transparent; color: var(--accent); }
  .btn-ghost:hover { background: rgba(0,113,227,.08); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 24px; padding: 16px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat .num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }

  /* ── Controls bar ── */
  .controls {
    display: flex; align-items: center; gap: 12px; padding: 16px 24px;
  }
  .controls input {
    flex: 1; max-width: 400px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; outline: none;
  }
  .controls input:focus { border-color: var(--accent); }

  /* ── Content area ── */
  .content { padding: 0 24px 40px; }

  /* ── Module card ── */
  .module-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  }
  .module-header {
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none; transition: background .1s;
  }
  .module-header:hover { background: #fafafa; }
  .module-header .arrow { font-size: 11px; color: var(--text2); transition: transform .2s; width: 16px; }
  .module-header .arrow.open { transform: rotate(90deg); }
  .module-header .title { font-weight: 600; font-size: 14px; flex: 1; }
  .module-header .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 99px;
    background: var(--tag-bg); color: var(--text2);
  }
  .module-header .actions { display: flex; gap: 4px; }
  .module-body { display: none; border-top: 1px solid var(--border); padding: 16px 18px; }
  .module-body.open { display: block; }
  .module-desc { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

  /* ── Chunk row ── */
  .chunk-card {
    background: #fafafa; border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 8px; overflow: hidden;
  }
  .chunk-header {
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none; font-size: 13px;
  }
  .chunk-header:hover { background: #f2f2f7; }
  .chunk-header .title { font-weight: 500; flex: 1; }
  .chunk-body { display: none; border-top: 1px solid var(--border); padding: 12px 14px; }
  .chunk-body.open { display: block; }
  .chunk-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .chunk-meta span { margin-right: 16px; }
  .chunk-content {
    font-size: 12px; background: #f0f0f5; padding: 10px; border-radius: 6px;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap;
    margin-bottom: 10px; font-family: 'SF Mono', Monaco, Consolas, monospace;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .tag {
    font-size: 11px; padding: 2px 8px; background: var(--tag-bg);
    border-radius: 99px; color: var(--text2);
  }

  /* ── QA pair ── */
  .qa-section { margin-top: 10px; }
  .qa-section h4 { font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .qa-item {
    padding: 8px 10px; border-left: 3px solid var(--accent);
    background: #fff; margin-bottom: 6px; border-radius: 0 6px 6px 0;
    font-size: 12px;
  }
  .qa-item .q { font-weight: 600; margin-bottom: 4px; }
  .qa-item .a { color: var(--text2); }
  .qa-item .qa-actions { margin-top: 4px; display: flex; gap: 4px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 1000; justify-content: center; align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; width: 90%; max-width: 600px;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; outline: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    background: #333; color: #fff; border-radius: 10px; font-size: 13px;
    z-index: 2000; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--text2); }
  .spinner {
    display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <h1>Third Intelligence Admin</h1>
  <div class="url-group">
    <input id="convexUrl" placeholder="Convex Deployment URL (https://xxx.convex.cloud)" />
    <button class="btn btn-primary btn-sm" onclick="connect()">Connect</button>
    <span id="connStatus" class="status pending">Not connected</span>
  </div>
</div>

<!-- ── Stats ── -->
<div class="stats" id="statsBar">
  <div class="stat"><div class="num" id="statMods">—</div><div class="label">Modules</div></div>
  <div class="stat"><div class="num" id="statChunks">—</div><div class="label">Chunks</div></div>
  <div class="stat"><div class="num" id="statQA">—</div><div class="label">QA Pairs</div></div>
</div>

<!-- ── Controls ── -->
<div class="controls">
  <input id="search" placeholder="Search modules, chunks, QA pairs..." oninput="filterModules()" />
  <button class="btn btn-primary" onclick="showAddModule()">+ Module</button>
  <button class="btn btn-ghost" onclick="refreshData()">Refresh</button>
</div>

<!-- ── Content ── -->
<div class="content" id="content">
  <div class="loading">Enter your Convex URL above and click Connect</div>
</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIf(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let CONVEX_URL = localStorage.getItem("convex_url") || "";
let allModules = []; // raw Convex module docs
let allChunks = {};  // moduleRef -> chunk[]
let allQAPairs = {}; // chunkRef -> qa[]

document.getElementById("convexUrl").value = CONVEX_URL;

// ── Convex HTTP helpers ──
async function cQuery(path, args = {}) {
  const res = await fetch(`${CONVEX_URL}/api/query`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ path, args, format: "json" }),
  });
  const data = await res.json();
  if (data.status !== "success") throw new Error(data.errorMessage || JSON.stringify(data));
  return data.value;
}

async function cMutation(path, args = {}) {
  const res = await fetch(`${CONVEX_URL}/api/mutation`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ path, args, format: "json" }),
  });
  const data = await res.json();
  if (data.status !== "success") throw new Error(data.errorMessage || JSON.stringify(data));
  return data.value;
}

// ── Connection ──
async function connect() {
  const url = document.getElementById("convexUrl").value.trim().replace(/\/$/, "");
  if (!url) return;
  CONVEX_URL = url;
  localStorage.setItem("convex_url", url);
  const status = document.getElementById("connStatus");
  status.className = "status pending"; status.textContent = "Connecting...";
  try {
    await cQuery("modules:list");
    status.className = "status ok"; status.textContent = "Connected";
    toast("Connected to Convex");
    refreshData();
  } catch (e) {
    status.className = "status err"; status.textContent = "Failed";
    toast("Connection failed: " + e.message);
  }
}

// ── Data loading ──
async function refreshData() {
  const el = document.getElementById("content");
  el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';
  try {
    allModules = await cQuery("modules:list");
    // Load chunks for all modules in parallel
    const chunkPromises = allModules.map(m => cQuery("chunks:list", { moduleRef: m._id }));
    const chunkResults = await Promise.all(chunkPromises);
    allChunks = {};
    const allChunkDocs = [];
    allModules.forEach((m, i) => { allChunks[m._id] = chunkResults[i]; allChunkDocs.push(...chunkResults[i]); });

    // Load QA pairs for all chunks in parallel (batch in groups of 50)
    allQAPairs = {};
    for (let i = 0; i < allChunkDocs.length; i += 50) {
      const batch = allChunkDocs.slice(i, i + 50);
      const qaResults = await Promise.all(batch.map(c => cQuery("qaPairs:list", { chunkRef: c._id })));
      batch.forEach((c, j) => { allQAPairs[c._id] = qaResults[j]; });
    }

    updateStats();
    renderModules();
  } catch (e) {
    el.innerHTML = `<div class="loading" style="color:var(--danger)">Error: ${esc(e.message)}</div>`;
  }
}

function updateStats() {
  document.getElementById("statMods").textContent = allModules.length;
  const totalChunks = Object.values(allChunks).reduce((s, c) => s + c.length, 0);
  document.getElementById("statChunks").textContent = totalChunks;
  const totalQA = Object.values(allQAPairs).reduce((s, q) => s + q.length, 0);
  document.getElementById("statQA").textContent = totalQA;
}

// ── Rendering ──
function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

function renderModules() {
  const el = document.getElementById("content");
  const query = document.getElementById("search").value.toLowerCase().trim();

  const filtered = allModules.filter(m => {
    if (!query) return true;
    if (m.title.toLowerCase().includes(query) || m.moduleId.toLowerCase().includes(query)) return true;
    const chunks = allChunks[m._id] || [];
    return chunks.some(c => {
      if (c.title.toLowerCase().includes(query)) return true;
      if (c.content && c.content.toLowerCase().includes(query)) return true;
      const qas = allQAPairs[c._id] || [];
      return qas.some(q => q.instruction.toLowerCase().includes(query) || q.output.toLowerCase().includes(query));
    });
  });

  if (filtered.length === 0) {
    el.innerHTML = '<div class="loading">No modules found</div>';
    return;
  }

  el.innerHTML = filtered.map(m => {
    const chunks = allChunks[m._id] || [];
    const qaCount = chunks.reduce((s, c) => s + (allQAPairs[c._id] || []).length, 0);
    return `
      <div class="module-card" data-id="${m._id}">
        <div class="module-header" onclick="toggleModule('${m._id}')">
          <span class="arrow" id="arrow-${m._id}">&#9654;</span>
          <span class="title">${esc(m.title)}</span>
          <span class="badge">${chunks.length} chunks</span>
          <span class="badge">${qaCount} QA</span>
          <div class="actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="showEditModule('${m._id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteModule('${m._id}')">Delete</button>
          </div>
        </div>
        <div class="module-body" id="body-${m._id}">
          <div class="module-desc">${esc(m.description)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <strong style="font-size:13px">Chunks</strong>
            <button class="btn btn-primary btn-sm" onclick="showAddChunk('${m._id}')">+ Chunk</button>
          </div>
          ${chunks.map(c => renderChunk(c)).join("")}
        </div>
      </div>`;
  }).join("");
}

function renderChunk(c) {
  const qas = allQAPairs[c._id] || [];
  const tags = (c.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  return `
    <div class="chunk-card">
      <div class="chunk-header" onclick="toggleChunk('${c._id}')">
        <span class="arrow" id="arrow-${c._id}">&#9654;</span>
        <span class="title">${esc(c.title)}</span>
        <span class="badge">${qas.length} QA</span>
        <div class="actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="showEditChunk('${c._id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteChunk('${c._id}')">Delete</button>
        </div>
      </div>
      <div class="chunk-body" id="body-${c._id}">
        <div class="chunk-meta">
          ${c.intent ? `<span>Intent: ${esc(c.intent)}</span>` : ""}
          ${c.priority ? `<span>Priority: ${esc(c.priority)}</span>` : ""}
          ${c.weight ? `<span>Weight: ${c.weight}</span>` : ""}
          ${c.context ? `<span>Context: ${esc(c.context)}</span>` : ""}
        </div>
        ${tags ? `<div class="tags">${tags}</div>` : ""}
        ${c.content ? `<div class="chunk-content">${esc(c.content)}</div>` : ""}
        <div class="qa-section">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <h4>QA Pairs (${qas.length})</h4>
            <button class="btn btn-primary btn-sm" onclick="showAddQA('${c._id}')">+ QA Pair</button>
          </div>
          ${qas.map(q => `
            <div class="qa-item">
              <div class="q">Q: ${esc(q.instruction)}</div>
              <div class="a">A: ${esc(q.output)}</div>
              <div class="qa-actions">
                <button class="btn btn-ghost btn-sm" onclick="showEditQA('${q._id}')">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteQA('${q._id}', '${c._id}')">Delete</button>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>`;
}

// ── Toggles ──
function toggleModule(id) {
  const body = document.getElementById("body-" + id);
  const arrow = document.getElementById("arrow-" + id);
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}
function toggleChunk(id) {
  const body = document.getElementById("body-" + id);
  const arrow = document.getElementById("arrow-" + id);
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}
function filterModules() { renderModules(); }

// ── Modal helpers ──
function openModal(html) { document.getElementById("modal").innerHTML = html; document.getElementById("modalOverlay").classList.add("open"); }
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
function closeModalIf(e) { if (e.target === e.currentTarget) closeModal(); }
function toast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Module CRUD ──
function showAddModule() {
  openModal(`
    <h2>Add Module</h2>
    <label>Module ID (slug)</label><input id="f_moduleId" placeholder="e.g. brm_special_hot" />
    <label>Title</label><input id="f_title" />
    <label>Description</label><textarea id="f_desc"></textarea>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAddModule()">Create</button>
    </div>
  `);
}
async function saveAddModule() {
  try {
    await cMutation("modules:create", {
      moduleId: document.getElementById("f_moduleId").value.trim(),
      title: document.getElementById("f_title").value.trim(),
      description: document.getElementById("f_desc").value.trim(),
    });
    closeModal(); toast("Module created"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

function showEditModule(id) {
  const m = allModules.find(x => x._id === id);
  if (!m) return;
  openModal(`
    <h2>Edit Module</h2>
    <label>Title</label><input id="f_title" value="${esc(m.title)}" />
    <label>Description</label><textarea id="f_desc">${esc(m.description)}</textarea>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditModule('${id}')">Save</button>
    </div>
  `);
}
async function saveEditModule(id) {
  try {
    await cMutation("modules:update", {
      id,
      title: document.getElementById("f_title").value.trim(),
      description: document.getElementById("f_desc").value.trim(),
    });
    closeModal(); toast("Module updated"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

async function deleteModule(id) {
  const m = allModules.find(x => x._id === id);
  if (!confirm(`Delete "${m?.title}" and ALL its chunks & QA pairs?`)) return;
  try {
    await cMutation("modules:remove", { id });
    toast("Module deleted"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

// ── Chunk CRUD ──
function showAddChunk(moduleRef) {
  openModal(`
    <h2>Add Chunk</h2>
    <label>Chunk ID</label><input id="f_chunkId" placeholder="e.g. my_chunk_1" />
    <label>Title</label><input id="f_title" />
    <label>Intent</label><input id="f_intent" />
    <label>Content</label><textarea id="f_content" style="min-height:120px"></textarea>
    <label>Tags (comma-separated)</label><input id="f_tags" />
    <label>Context</label><input id="f_context" />
    <label>Priority</label><input id="f_priority" placeholder="high / medium / low" />
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAddChunk('${moduleRef}')">Create</button>
    </div>
  `);
}
async function saveAddChunk(moduleRef) {
  const tags = document.getElementById("f_tags").value.split(",").map(t => t.trim()).filter(Boolean);
  try {
    await cMutation("chunks:create", {
      moduleRef,
      chunkId: document.getElementById("f_chunkId").value.trim(),
      title: document.getElementById("f_title").value.trim(),
      intent: document.getElementById("f_intent").value.trim() || undefined,
      content: document.getElementById("f_content").value.trim() || undefined,
      tags: tags.length ? tags : undefined,
      context: document.getElementById("f_context").value.trim() || undefined,
      priority: document.getElementById("f_priority").value.trim() || undefined,
    });
    closeModal(); toast("Chunk created"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

function findChunk(id) {
  for (const arr of Object.values(allChunks)) {
    const c = arr.find(x => x._id === id);
    if (c) return c;
  }
  return null;
}

function showEditChunk(id) {
  const c = findChunk(id);
  if (!c) return;
  openModal(`
    <h2>Edit Chunk</h2>
    <label>Title</label><input id="f_title" value="${esc(c.title)}" />
    <label>Intent</label><input id="f_intent" value="${esc(c.intent || '')}" />
    <label>Content</label><textarea id="f_content" style="min-height:120px">${esc(c.content || '')}</textarea>
    <label>Tags (comma-separated)</label><input id="f_tags" value="${esc((c.tags || []).join(', '))}" />
    <label>Context</label><input id="f_context" value="${esc(c.context || '')}" />
    <label>Priority</label><input id="f_priority" value="${esc(c.priority || '')}" />
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditChunk('${id}')">Save</button>
    </div>
  `);
}
async function saveEditChunk(id) {
  const tags = document.getElementById("f_tags").value.split(",").map(t => t.trim()).filter(Boolean);
  try {
    await cMutation("chunks:update", {
      id,
      title: document.getElementById("f_title").value.trim(),
      intent: document.getElementById("f_intent").value.trim() || undefined,
      content: document.getElementById("f_content").value.trim() || undefined,
      tags: tags.length ? tags : undefined,
      context: document.getElementById("f_context").value.trim() || undefined,
      priority: document.getElementById("f_priority").value.trim() || undefined,
    });
    closeModal(); toast("Chunk updated"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

async function deleteChunk(id) {
  const c = findChunk(id);
  if (!confirm(`Delete chunk "${c?.title}" and all its QA pairs?`)) return;
  try {
    await cMutation("chunks:remove", { id });
    toast("Chunk deleted"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

function showAddQA(chunkRef) {
  openModal(`
    <h2>Add QA Pair</h2>
    <label>Question (instruction)</label><textarea id="f_instruction" style="min-height:60px"></textarea>

      <button class="btn btn-primary" onclick="saveAddQA('${chunkRef}')">Create</button>
    </div>
  `);
}
async function saveAddQA(chunkRef) {
  try {
    await cMutation("qaPairs:create", {
      chunkRef,
      instruction: document.getElementById("f_instruction").value.trim(),
      output: document.getElementById("f_output").value.trim(),
    });
    closeModal(); toast("QA pair created"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

function findQA(id) {
  for (const arr of Object.values(allQAPairs)) {
    const q = arr.find(x => x._id === id);
    if (q) return q;
  }
  return null;
}

function showEditQA(id) {
  const q = findQA(id);
  if (!q) return;
  openModal(`
    <h2>Edit QA Pair</h2>
    <label>Question (instruction)</label><textarea id="f_instruction" style="min-height:60px">${esc(q.instruction)}</textarea>
    <label>Answer (output)</label><textarea id="f_output" style="min-height:100px">${esc(q.output)}</textarea>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditQA('${id}')">Save</button>
    </div>
  `);
}
async function saveEditQA(id) {
  try {
    await cMutation("qaPairs:update", {
      id,
      instruction: document.getElementById("f_instruction").value.trim(),
      output: document.getElementById("f_output").value.trim(),
    });
    closeModal(); toast("QA pair updated"); refreshData();
  } catch (e) { toast("Error: " + e.message); }
}

}
