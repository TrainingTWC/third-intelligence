services:
  - type: web
    name: third-intelligence
    runtime: docker
    plan: starter
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemma-4-31b-it
      - key: API_KEY
        generateValue: true  # Auto-generates a random API key for external apps
      - key: PORT
        value: 8000
      - key: GOOGLE_SHEETS_WEBHOOK
        value: "https://script.google.com/macros/s/AKfycbxnO_CE1VyZRqgevf9w2ZbtNzefF5fOl7BgtaVh66_pv_TKLSCzWOAPvjO_qGpdig1R/exec"
